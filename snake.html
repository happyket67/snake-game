<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --green: #3fb950;
      --green-glow: #3fb95066;
      --green-dim: #238636;
      --snake-head: #56d364;
      --snake-body: #3fb950;
      --food: #f78166;
      --food-glow: #f7816688;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-family: 'VT323', monospace;
      font-size: 2.8rem;
      color: var(--green);
      text-shadow: 0 0 20px var(--green-glow);
      letter-spacing: 4px;
    }

    .gh-badge {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .stats-row {
      display: flex;
      gap: 24px;
      width: 100%;
      justify-content: space-between;
    }

    .stat-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }

    .stat-label {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'VT323', monospace;
      font-size: 1.8rem;
      color: var(--green);
      text-shadow: 0 0 10px var(--green-glow);
      line-height: 1.1;
    }

    #game-wrap {
      position: relative;
    }

    canvas {
      display: block;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      box-shadow:
        0 0 0 1px #21262d,
        0 8px 40px rgba(0,0,0,0.6),
        inset 0 0 60px rgba(63,185,80,0.03);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(13,17,23,0.88);
      border-radius: 10px;
      gap: 16px;
      backdrop-filter: blur(2px);
    }

    #overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'VT323', monospace;
      font-size: 3rem;
      color: var(--green);
      text-shadow: 0 0 30px var(--green-glow);
      letter-spacing: 4px;
    }

    .overlay-sub {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .overlay-score {
      font-family: 'VT323', monospace;
      font-size: 2rem;
      color: var(--text);
    }

    .btn {
      background: var(--green-dim);
      color: #fff;
      border: 1px solid var(--green);
      border-radius: 6px;
      padding: 10px 32px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }

    .btn:hover {
      background: var(--green);
      box-shadow: 0 0 18px var(--green-glow);
      transform: translateY(-1px);
    }

    .controls-hint {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 1px;
    }

    .key {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.7rem;
      color: var(--text);
    }

    .contribution-bar {
      width: 100%;
      height: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .contribution-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      box-shadow: 0 0 8px var(--green-glow);
      transition: width 0.3s ease;
    }

    /* Mobile D-Pad */
    .dpad {
      display: none;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 4px;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .dpad { display: grid; }
    }

    .dpad-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
      user-select: none;
    }

    .dpad-btn:active { background: var(--green-dim); }
    .dpad-center { background: transparent; border-color: transparent; cursor: default; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <span class="logo">SNAKE</span>
    <span class="gh-badge">github edition</span>
  </header>

  <div class="stats-row" id="stats-row">
    <div class="stat-box">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="score-display">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="best-display">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Level</span>
      <span class="stat-value" id="level-display">1</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Length</span>
      <span class="stat-value" id="length-display">1</span>
    </div>
  </div>

  <div id="game-wrap">
    <canvas id="canvas" width="420" height="420"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlay-title">SNAKE</div>
      <div class="overlay-sub" id="overlay-sub">eat to grow · avoid walls & yourself</div>
      <div class="overlay-score" id="overlay-score" style="display:none"></div>
      <button class="btn" id="start-btn">▶ START GAME</button>
    </div>
  </div>

  <div class="contribution-bar">
    <div class="contribution-fill" id="contrib-fill" style="width:0%"></div>
  </div>

  <div class="controls-hint">
    <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
    or
    <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span>
    &nbsp;·&nbsp; <span class="key">P</span> pause
  </div>

  <div class="dpad">
    <div></div>
    <div class="dpad-btn" id="d-up">▲</div>
    <div></div>
    <div class="dpad-btn" id="d-left">◀</div>
    <div class="dpad-center"></div>
    <div class="dpad-btn" id="d-right">▶</div>
    <div></div>
    <div class="dpad-btn" id="d-down">▼</div>
    <div></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const COLS = 21, ROWS = 21;
  const CELL = canvas.width / COLS;

  let snake, dir, nextDir, food, score, best, level, gameLoop, paused, running;
  best = parseInt(localStorage.getItem('snake-best') || '0');
  document.getElementById('best-display').textContent = best;

  // Colors from CSS vars (read at runtime)
  const C = {
    bg: '#161b22',
    grid: '#1c2128',
    head: '#56d364',
    body: '#3fb950',
    bodyDim: '#238636',
    food: '#f78166',
    foodGlow: '#f78166',
    text: '#e6edf3',
    muted: '#8b949e',
  };

  function initGame() {
    snake = [{ x: 10, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    paused = false;
    running = true;
    placeFood();
    updateUI();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
    food.pulse = 0;
  }

  function getSpeed() {
    // Level 1: 160ms, each level -12ms, min 60ms
    return Math.max(60, 160 - (level - 1) * 12);
  }

  function step() {
    if (!running || paused) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      level = Math.floor(score / 100) + 1;
      if (score > best) { best = score; localStorage.setItem('snake-best', best); }
      placeFood();
      spawnParticles(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2);
    } else {
      snake.pop();
    }

    updateUI();
    draw();
  }

  function updateUI() {
    document.getElementById('score-display').textContent = score;
    document.getElementById('best-display').textContent = best;
    document.getElementById('level-display').textContent = level;
    document.getElementById('length-display').textContent = snake.length;
    // contribution bar: progress in current level
    const progress = (score % 100) / 100 * 100;
    document.getElementById('contrib-fill').style.width = progress + '%';
  }

  // --- Particles ---
  let particles = [];
  function spawnParticles(x, y) {
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 2.5 + 0.5;
      particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color: C.food });
    }
  }

  // --- Draw ---
  let foodAnim = 0;
  function draw() {
    foodAnim += 0.1;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = C.grid;
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        ctx.beginPath();
        ctx.arc(x * CELL + CELL / 2, y * CELL + CELL / 2, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Food glow
    const fCX = food.x * CELL + CELL / 2;
    const fCY = food.y * CELL + CELL / 2;
    const pulse = Math.sin(foodAnim) * 0.4 + 0.6;
    const grad = ctx.createRadialGradient(fCX, fCY, 0, fCX, fCY, CELL * 1.2 * pulse);
    grad.addColorStop(0, 'rgba(247,129,102,0.35)');
    grad.addColorStop(1, 'rgba(247,129,102,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(fCX, fCY, CELL * 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Food (apple-ish pixel block)
    const fr = CELL * 0.38 * (0.92 + Math.sin(foodAnim) * 0.08);
    ctx.save();
    ctx.shadowColor = C.foodGlow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = C.food;
    roundRect(ctx, food.x * CELL + CELL * 0.5 - fr, food.y * CELL + CELL * 0.5 - fr, fr * 2, fr * 2, 3);
    ctx.fill();
    ctx.restore();

    // Snake
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const t = i / snake.length;
      const isHead = i === 0;

      ctx.save();
      if (isHead) {
        ctx.shadowColor = C.head;
        ctx.shadowBlur = 16;
        ctx.fillStyle = C.head;
      } else {
        ctx.fillStyle = lerpColor(C.body, C.bodyDim, t);
        ctx.shadowBlur = 0;
      }

      const pad = isHead ? 1 : 2;
      const r = isHead ? 4 : 3;
      roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, r);
      ctx.fill();

      // Eyes on head
      if (isHead) {
        ctx.fillStyle = '#0d1117';
        const ex = dir.x, ey = dir.y;
        const cx = seg.x * CELL + CELL / 2;
        const cy = seg.y * CELL + CELL / 2;
        // perpendicular offset for two eyes
        const px = -ey * CELL * 0.2, py = ex * CELL * 0.2;
        const fwd = CELL * 0.22;
        ctx.beginPath();
        ctx.arc(cx + ex * fwd + px, cy + ey * fwd + py, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx + ex * fwd - px, cy + ey * fwd - py, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // Particles
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.life -= 0.06;
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function lerpColor(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return `rgb(${rr},${rg},${rb})`;
  }

  function gameOver() {
    running = false;
    clearInterval(gameLoop);
    if (score > best) { best = score; localStorage.setItem('snake-best', best); }
    document.getElementById('best-display').textContent = best;

    const overlay = document.getElementById('overlay');
    overlay.classList.remove('hidden');
    document.getElementById('overlay-title').textContent = 'GAME OVER';
    document.getElementById('overlay-sub').textContent = 'better luck next time';
    const sc = document.getElementById('overlay-score');
    sc.style.display = 'block';
    sc.textContent = `score: ${score}  ·  best: ${best}`;
    document.getElementById('start-btn').textContent = '↺ PLAY AGAIN';
  }

  function startGame() {
    clearInterval(gameLoop);
    document.getElementById('overlay').classList.add('hidden');
    initGame();
    draw();
    gameLoop = setInterval(() => {
      step();
      if (running) {
        clearInterval(gameLoop);
        gameLoop = setInterval(() => { step(); }, getSpeed());
      }
    }, getSpeed());
    // Reset interval dynamically on level up
    const dynamicLoop = () => {
      if (!running) return;
      step();
      setTimeout(dynamicLoop, getSpeed());
    };
    clearInterval(gameLoop);
    setTimeout(dynamicLoop, getSpeed());
  }

  document.getElementById('start-btn').addEventListener('click', startGame);

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
    };
    if (map[e.key]) {
      e.preventDefault();
      const nd = map[e.key];
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    }
    if (e.key === 'p' || e.key === 'P') {
      if (!running) return;
      paused = !paused;
    }
  });

  // D-pad
  const dpadMap = {
    'dpad-up': { x: 0, y: -1 }, 'd-up': { x: 0, y: -1 },
    'd-left': { x: -1, y: 0 }, 'd-right': { x: 1, y: 0 }, 'd-down': { x: 0, y: 1 }
  };
  ['d-up','d-left','d-right','d-down'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('click', () => {
      const nd = dpadMap[id];
      if (nd && (nd.x !== -dir.x || nd.y !== -dir.y)) nextDir = nd;
    });
  });

  // Initial static draw
  (function initDraw() {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = C.grid;
    for (let x = 0; x < COLS; x++)
      for (let y = 0; y < ROWS; y++) {
        ctx.beginPath();
        ctx.arc(x * CELL + CELL / 2, y * CELL + CELL / 2, 1, 0, Math.PI * 2);
        ctx.fill();
      }
  })();
</script>
</body>
</html>
