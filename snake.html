<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Snake</title>

<style>
body {
  margin: 0;
  background: #0b1220;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hud {
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #111827;
}

.wrapper {
  position: relative;
  margin-top: 10px;
}

canvas {
  background: #0f172a;
  border: 2px solid #38bdf8;
}

.overlay {
  position: absolute;
  width: 400px;
  height: 400px;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.85);
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hud">
  <div id="score">Score: 0</div>
  <div id="high">High: 0</div>
  <button onclick="toggleAI()">AI OFF</button>
</div>

<div class="wrapper">
<canvas id="game" width="400" height="400"></canvas>

<div class="overlay" id="over">
  <h2>💀 Game Over</h2>
  <p id="final"></p>
  <button onclick="restart()">Retry</button>
</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 20;
let snake, dir, food, score;
let ai = false;

let high = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = "High: " + high;

/* ---------- INIT ---------- */
function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  food = rand();
  score = 0;
  document.getElementById("over").style.display="none";
  document.getElementById("score").innerText="Score: 0";
}

function rand(){
  return {
    x: Math.floor(Math.random()*SIZE),
    y: Math.floor(Math.random()*SIZE)
  };
}

/* ---------- INPUT (FIXED) ---------- */
document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();

  if((k==="arrowleft"||k==="a") && dir.x!==1) dir={x:-1,y:0};
  if((k==="arrowright"||k==="d") && dir.x!==-1) dir={x:1,y:0};
  if((k==="arrowup"||k==="w") && dir.y!==1) dir={x:0,y:-1};
  if((k==="arrowdown"||k==="s") && dir.y!==-1) dir={x:0,y:1};
});

/* ---------- BFS AI (TRUE PATHFINDING) ---------- */
function bfs(start, target, snakeBody){
  let queue = [start];
  let visited = new Set();
  let parent = new Map();

  function key(p){ return p.x+","+p.y; }

  visited.add(key(start));

  const dirs = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ];

  while(queue.length){
    let cur = queue.shift();

    if(cur.x===target.x && cur.y===target.y){
      let path=[];
      let k=key(cur);
      while(parent.has(k)){
        path.push(cur);
        cur = parent.get(k);
        k=key(cur);
      }
      return path.reverse();
    }

    for(let d of dirs){
      let nx = cur.x + d.x;
      let ny = cur.y + d.y;

      let np = {x:nx,y:ny};
      let nk = key(np);

      if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;
      if(visited.has(nk)) continue;

      // avoid snake
      if(snakeBody.some(s=>s.x===nx&&s.y===ny)) continue;

      visited.add(nk);
      parent.set(nk, cur);
      queue.push(np);
    }
  }
  return null;
}

/* ---------- AI CONTROL ---------- */
function aiMove(){
  let path = bfs(snake[0], food, snake);

  if(path && path.length){
    let next = path[0];
    dir = {
      x: next.x - snake[0].x,
      y: next.y - snake[0].y
    };
  }
}

/* ---------- GAME LOGIC ---------- */
function update(){
  if(ai) aiMove();

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  if(head.x<0||head.y<0||head.x>=SIZE||head.y>=SIZE){
    return gameOver();
  }

  for(let s of snake){
    if(s.x===head.x&&s.y===head.y) return gameOver();
  }

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score++;
    food = rand();
    document.getElementById("score").innerText="Score: "+score;
  } else {
    snake.pop();
  }
}

/* ---------- SMOOTH RENDER (60FPS CLEAN) ---------- */
function draw(){
  ctx.clearRect(0,0,400,400);

  // food
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(food.x*20+10, food.y*20+10, 8,0,Math.PI*2);
  ctx.fill();

  // snake
  for(let i=0;i<snake.length;i++){
    ctx.fillStyle = i===0 ? "#00ff88" : "#22c55e";
    ctx.beginPath();
    ctx.arc(snake[i].x*20+10, snake[i].y*20+10, 9,0,Math.PI*2);
    ctx.fill();
  }
}

/* ---------- FIXED TIMESTEP ENGINE ---------- */
let last=0,acc=0;
const STEP=120;

function loop(t){
  requestAnimationFrame(loop);

  if(!last) last=t;
  let delta=t-last;
  last=t;
  acc+=delta;

  while(acc>STEP){
    update();
    acc-=STEP;
  }

  draw();
}

/* ---------- GAME OVER ---------- */
function gameOver(){
  document.getElementById("over").style.display="flex";
  document.getElementById("final").innerText="Score: "+score;

  if(score>high){
    high=score;
    localStorage.setItem("high",high);
  }

  document.getElementById("high").innerText="High: "+high;
}

/* ---------- CONTROL ---------- */
function toggleAI(){
  ai=!ai;
  alert("AI: "+(ai?"ON":"OFF"));
}

function restart(){ init(); }

init();
requestAnimationFrame(loop);
</script>

</body>
</html>
