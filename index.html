<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 50px;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #38bdf8;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🎮 Guess the Number</h1>

    <p id="info">Choose difficulty to start</p>

    <button onclick="startGame(10,5)">Easy</button>
    <button onclick="startGame(50,7)">Medium</button>
    <button onclick="startGame(100,10)">Hard</button>

    <div id="gameArea" style="display:none;">
      <p id="status"></p>
      <input type="number" id="guessInput" placeholder="Enter guess">
      <br>
      <button onclick="checkGuess()">Guess</button>
    </div>
  </div>

<script>
let secretNumber;
let attempts;
let maxAttempts;

function startGame(maxNum, tries) {
  secretNumber = Math.floor(Math.random() * maxNum) + 1;
  attempts = tries;
  maxAttempts = tries;

  document.getElementById("gameArea").style.display = "block";
  document.getElementById("status").innerText =
    "Guess a number between 1 and " + maxNum + 
    " | Attempts left: " + attempts;
}

function checkGuess() {
  const input = document.getElementById("guessInput");
  const guess = Number(input.value);

  if (!guess) {
    alert("Enter a number!");
    return;
  }

  if (guess === secretNumber) {
    document.getElementById("status").innerText =
      "🎉 Correct! You win!";
    return;
  }

  attempts--;

  if (attempts <= 0) {
    document.getElementById("status").innerText =
      "💀 You lost! Number was " + secretNumber;
    return;
  }

  if (guess < secretNumber) {
    document.getElementById("status").innerText =
      "📉 Too low! Attempts left: " + attempts;
  } else {
    document.getElementById("status").innerText =
      "📈 Too high! Attempts left: " + attempts;
  }

  input.value = "";
}
</script>

</body>
</html>
