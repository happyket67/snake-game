<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smooth Snake</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hud {
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #1e293b;
}

.wrapper {
  position: relative;
  margin-top: 15px;
}

canvas {
  background: #111827;
  border: 3px solid #38bdf8;
}

/* overlay */
.overlay {
  position: absolute;
  width: 400px;
  height: 400px;
  top: 0;
  left: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.85);
}

/* mobile */
.controls {
  display: grid;
  grid-template-columns: repeat(3, 60px);
  margin-top: 10px;
  gap: 5px;
}

button {
  padding: 10px;
  border: none;
  background: #38bdf8;
  font-weight: bold;
  border-radius: 8px;
}

button:hover {
  background: #0ea5e9;
}
</style>
</head>

<body>

<div class="hud">
  <div id="score">Score: 0</div>
  <div id="high">High: 0</div>
  <button onclick="toggleAI()">AI OFF</button>
</div>

<div class="wrapper">
<canvas id="game" width="400" height="400"></canvas>

<div class="overlay" id="over">
  <h2>💀 Game Over</h2>
  <p id="final"></p>
  <button onclick="restart()">Retry</button>
</div>
</div>

<!-- mobile -->
<div class="controls">
  <div></div>
  <button onclick="dir('up')">⬆</button>
  <div></div>

  <button onclick="dir('left')">⬅</button>
  <button onclick="dir('down')">⬇</button>
  <button onclick="dir('right')">➡</button>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

const grid = 20;
const size = 20;

let snake, dirX, dirY, food;
let score = 0;
let high = localStorage.getItem("high") || 0;

document.getElementById("high").innerText = "High: " + high;

let ai = false;

/* FIXED TIMESTEP (smooth movement core) */
let lastTime = 0;
let acc = 0;
const step = 120; // ms per move (smooth like Google snake)

function init() {
  snake = [{x:10,y:10}];
  dirX = 1;
  dirY = 0;
  score = 0;
  food = spawn();
  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("over").style.display = "none";
}

function spawn() {
  return {
    x: Math.floor(Math.random()*20),
    y: Math.floor(Math.random()*20)
  };
}

/* SOUND */
function eatSound() {
  const a = new (window.AudioContext||window.webkitAudioContext)();
  const o = a.createOscillator();
  const g = a.createGain();

  o.type = "square";
  o.frequency.value = 500;
  g.gain.value = 0.1;

  o.connect(g);
  g.connect(a.destination);

  o.start();
  o.stop(a.currentTime + 0.08);
}

/* AI (simple chase) */
function aiMove(head) {
  if (head.x < food.x) setDir("right");
  if (head.x > food.x) setDir("left");
  if (head.y < food.y) setDir("down");
  if (head.y > food.y) setDir("up");
}

/* UPDATE GAME LOGIC */
function update() {
  const head = {
    x: snake[0].x + dirX,
    y: snake[0].y + dirY
  };

  if (ai) aiMove(head);

  // wall
  if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size)
    return gameOver();

  // self
  for (let s of snake)
    if (s.x === head.x && s.y === head.y)
      return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    food = spawn();
    eatSound();
    document.getElementById("score").innerText = "Score: " + score;
  } else {
    snake.pop();
  }
}

/* SMOOTH RENDER */
function draw() {
  ctx.clearRect(0,0,400,400);

  // food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);

  // snake
  ctx.fillStyle = "lime";
  for (let s of snake) {
    ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2);
  }
}

/* GAME LOOP (smooth fixed timestep) */
function loop(time) {
  requestAnimationFrame(loop);

  if (!lastTime) lastTime = time;
  let delta = time - lastTime;
  lastTime = time;
  acc += delta;

  while (acc > step) {
    update();
    acc -= step;
  }

  draw();
}

/* GAME OVER */
function gameOver() {
  document.getElementById("over").style.display = "flex";
  document.getElementById("final").innerText = "Score: " + score;

  if (score > high) {
    high = score;
    localStorage.setItem("high", high);
  }

  document.getElementById("high").innerText = "High: " + high;
}

/* controls */
document.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if ((k==="a"||k==="arrowleft") && dirX!==1) setDir("left");
  if ((k==="d"||k==="arrowright") && dirX!==-1) setDir("right");
  if ((k==="w"||k==="arrowup") && dirY!==1) setDir("up");
  if ((k==="s"||k==="arrowdown") && dirY!==-1) setDir("down");
});

function setDir(d) {
  if (d==="left" && dirX!==1) {dirX=-1;dirY=0;}
  if (d==="right"&& dirX!==-1){dirX=1;dirY=0;}
  if (d==="up"   && dirY!==1) {dirX=0;dirY=-1;}
  if (d==="down" && dirY!==-1){dirX=0;dirY=1;}
}

function dir(d){ setDir(d); }

function restart(){ init(); }

function toggleAI(){
  ai = !ai;
  alert("AI: " + (ai?"ON":"OFF"));
}

init();
requestAnimationFrame(loop);
</script>

</body>
</html>
