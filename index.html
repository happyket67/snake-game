<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');

:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --green: #3fb950;
  --green-glow: #3fb95066;
  --green-dim: #238636;
  --snake-head: #56d364;
  --snake-body: #3fb950;
  --food: #f78166;
  --food-glow: #f7816688;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.25;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  font-family: 'VT323', monospace;
  font-size: 2.8rem;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-glow);
  letter-spacing: 4px;
}

.gh-badge {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.72rem;
  color: var(--muted);
}

.btn {
  background: var(--green-dim);
  color: #fff;
  border: 1px solid var(--green);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.7rem;
  cursor: pointer;
}

#overlay.paused-mode {
  background: rgba(0,0,0,0.95);
}

#pause-text {
  display:none;
  font-size:2rem;
  color:white;
  letter-spacing:3px;
}

canvas {
  display: block;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--panel);
  box-shadow:
    0 0 0 1px #21262d,
    0 8px 40px rgba(0,0,0,0.6),
    inset 0 0 60px rgba(63,185,80,0.03);
}
</style>
</head>

<body>

<div class="container">
  <header>
    <span class="logo">SNAKE</span>
    <span class="gh-badge">github edition</span>
    <button class="btn" id="ai-toggle">AI: ON</button>
  </header>

  <div id="game-wrap" style="position:relative;">
    <canvas id="canvas" width="420" height="420"></canvas>

    <div id="overlay" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,17,23,0.88);color:white;">
      <div class="overlay-title">SNAKE</div>
      <div id="pause-text">PAUSED</div>
      <button onclick="startGame()" class="btn">START</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const COLS = 21;
const ROWS = 21;
const CELL = 20;

let snake, dir, nextDir, food;
let running = false;
let paused = false;
let aiEnabled = true;

/* INIT */
function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  food = spawn();
}

function spawn(){
  return {
    x: Math.floor(Math.random()*COLS),
    y: Math.floor(Math.random()*ROWS)
  };
}

/* AI */
function ai(){
  const head = snake[0];
  const dirs = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ];

  for(let d of dirs){
    let nx = head.x + d.x;
    let ny = head.y + d.y;

    if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
    if(snake.some(s=>s.x===nx&&s.y===ny)) continue;

    return d;
  }

  return dir;
}

/* UPDATE */
function update(){
  if(paused || !running) return;

  dir = aiEnabled ? ai() : nextDir;

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  if(head.x<0||head.y<0||head.x>=COLS||head.y>=ROWS){
    return gameOver();
  }

  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    return gameOver();
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food = spawn();
  } else {
    snake.pop();
  }
}

/* DRAW (SMOOTH SNAKE) */
function draw(){
  ctx.clearRect(0,0,420,420);

  // food
  ctx.fillStyle="#f78166";
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, 6, 0, Math.PI*2);
  ctx.fill();

  // smooth snake
  if(snake.length>1){
    ctx.lineJoin="round";
    ctx.lineCap="round";

    ctx.beginPath();
    ctx.moveTo(
      snake[0].x*CELL+CELL/2,
      snake[0].y*CELL+CELL/2
    );

    for(let i=1;i<snake.length;i++){
      ctx.lineTo(
        snake[i].x*CELL+CELL/2,
        snake[i].y*CELL+CELL/2
      );
    }

    ctx.strokeStyle="#3fb950";
    ctx.lineWidth=CELL*0.85;
    ctx.shadowColor="#3fb950";
    ctx.shadowBlur=10;
    ctx.stroke();

    let h=snake[0];
    ctx.fillStyle="#56d364";
    ctx.beginPath();
    ctx.arc(
      h.x*CELL+CELL/2,
      h.y*CELL+CELL/2,
      CELL*0.45,
      0,
      Math.PI*2
    );
    ctx.fill();
  }
}

/* LOOP */
function loop(){
  setTimeout(loop, 100);
  update();
  draw();
}

/* GAME OVER */
function gameOver(){
  running=false;
  document.getElementById("overlay").style.display="flex";
}

/* START */
function startGame(){
  init();
  running=true;
  document.getElementById("overlay").style.display="none";
}

/* INPUT */
document.addEventListener("keydown", e=>{
  const k=e.key.toLowerCase();

  if(k==="w") nextDir={x:0,y:-1};
  if(k==="s") nextDir={x:0,y:1};
  if(k==="a") nextDir={x:-1,y:0};
  if(k==="d") nextDir={x:1,y:0};

  if(k==="p"){
    paused=!paused;
    const overlay=document.getElementById("overlay");
    const pause=document.getElementById("pause-text");

    overlay.classList.toggle("paused-mode",paused);
    pause.style.display = paused ? "block" : "none";
  }
});

/* AI TOGGLE */
document.getElementById("ai-toggle").onclick = () => {
  aiEnabled = !aiEnabled;
  document.getElementById("ai-toggle").innerText =
    aiEnabled ? "AI: ON" : "AI: OFF";
};

init();
loop();
</script>

</body>
</html>
