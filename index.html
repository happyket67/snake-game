<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');

:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --green: #3fb950;
  --green-glow: #3fb95066;
  --snake-head: #56d364;
  --food: #f78166;
  --text: #e6edf3;
  --muted: #8b949e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.logo {
  font-family: 'VT323', monospace;
  font-size: 2.5rem;
  color: var(--green);
}

.btn {
  padding: 6px 10px;
  border: 1px solid var(--green);
  background: transparent;
  color: white;
  cursor: pointer;
  font-size: 0.7rem;
}

canvas {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
}

/* overlay */
#overlay {
  position: absolute;
  width: 420px;
  height: 420px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  color: white;
}

#overlay.hidden { display: none; }

#pause-text {
  display:none;
  font-size: 2rem;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">SNAKE</div>
  <button class="btn" id="aiBtn">AI: ON</button>
</header>

<div style="position:relative;">
<canvas id="c" width="420" height="420"></canvas>

<div id="overlay">
  <div>CLICK START</div>
  <button class="btn" onclick="start()">START</button>
  <div id="pause-text">PAUSED</div>
</div>

</div>

</div>

<script>

const c = document.getElementById("c");
const ctx = c.getContext("2d");

const CELL = 20;
const COLS = 21;
const ROWS = 21;

let snake, dir, nextDir, food;
let running = false;
let paused = false;
let ai = true;

document.getElementById("aiBtn").onclick = () => {
  ai = !ai;
  document.getElementById("aiBtn").innerText = "AI: " + (ai ? "ON" : "OFF");
};

function reset(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  food = spawn();
}

function spawn(){
  return {
    x: Math.floor(Math.random()*COLS),
    y: Math.floor(Math.random()*ROWS)
  };
}

/* AI (safe move) */
function getAI(){
  const h = snake[0];
  const dirs = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ];

  for(let d of dirs){
    let nx = h.x + d.x;
    let ny = h.y + d.y;

    if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
    if(snake.some(s=>s.x===nx&&s.y===ny)) continue;

    return d;
  }

  return dir;
}

/* update */
function update(){
  if(!running || paused) return;

  dir = ai ? getAI() : nextDir;

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  if(head.x<0||head.y<0||head.x>=COLS||head.y>=ROWS){
    return gameOver();
  }

  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    return gameOver();
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food = spawn();
  } else {
    snake.pop();
  }
}

/* draw (SMOOTH SNAKE) */
function draw(){
  ctx.clearRect(0,0,420,420);

  // food
  ctx.fillStyle="#f78166";
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, 6, 0, Math.PI*2);
  ctx.fill();

  // snake (smooth curve)
  ctx.lineJoin="round";
  ctx.lineCap="round";

  ctx.beginPath();
  ctx.moveTo(
    snake[0].x*CELL+CELL/2,
    snake[0].y*CELL+CELL/2
  );

  for(let i=1;i<snake.length;i++){
    ctx.lineTo(
      snake[i].x*CELL+CELL/2,
      snake[i].y*CELL+CELL/2
    );
  }

  ctx.strokeStyle="#3fb950";
  ctx.lineWidth=CELL*0.85;
  ctx.shadowColor="#3fb950";
  ctx.shadowBlur=10;
  ctx.stroke();

  // head
  const h = snake[0];
  ctx.fillStyle="#56d364";
  ctx.beginPath();
  ctx.arc(h.x*CELL+CELL/2,h.y*CELL+CELL/2,CELL*0.45,0,Math.PI*2);
  ctx.fill();
}

/* loop */
function loop(){
  setTimeout(loop, 100);
  update();
  draw();
}

/* start */
function start(){
  reset();
  running = true;
  paused = false;
  document.getElementById("overlay").classList.add("hidden");
}

/* pause + controls */
document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();

  if(k==="w") nextDir={x:0,y:-1};
  if(k==="s") nextDir={x:0,y:1};
  if(k==="a") nextDir={x:-1,y:0};
  if(k==="d") nextDir={x:1,y:0};

  if(k==="p"){
    paused = !paused;
    document.getElementById("pause-text").style.display =
      paused ? "block" : "none";

    document.getElementById("overlay").classList.toggle("hidden", !paused);
  }
});

function gameOver(){
  running = false;
  document.getElementById("overlay").classList.remove("hidden");
}

reset();
loop();

</script>

</body>
</html>
