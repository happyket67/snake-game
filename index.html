```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  body {
    background: #0f172a;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  canvas {
    background: #111827;
    margin-top: 20px;
    border: 3px solid #38bdf8;
  }
</style>
</head>
<body>

<h1>🐍 Snake Game</h1>
<p>Use WASD or Arrow Keys</p>
<p id="score">Score: 0</p>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
let snake = [{x: 200, y: 200}];
let dx = grid;
let dy = 0;

let food = {
  x: Math.floor(Math.random() * 20) * grid,
  y: Math.floor(Math.random() * 20) * grid
};

let score = 0;
let count = 0;

// Slower speed (increase this to make slower)
const speed = 12;

function gameLoop() {
  requestAnimationFrame(gameLoop);

  if (++count < speed) return;
  count = 0;

  // Move head
  const head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // Wall collision
  if (head.x < 0 || head.x >= canvas.width ||
      head.y < 0 || head.y >= canvas.height) {
    return resetGame();
  }

  // Self collision
  for (let cell of snake) {
    if (cell.x === head.x && cell.y === head.y) {
      return resetGame();
    }
  }

  snake.unshift(head);

  // Eat food
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;

    food.x = Math.floor(Math.random() * 20) * grid;
    food.y = Math.floor(Math.random() * 20) * grid;
  } else {
    snake.pop();
  }

  // Draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, grid - 1, grid - 1);

  // Snake
  ctx.fillStyle = "lime";
  snake.forEach(cell => {
    ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);
  });
}

function resetGame() {
  snake = [{x: 200, y: 200}];
  dx = grid;
  dy = 0;
  score = 0;
  document.getElementById("score").innerText = "Score: 0";
}

// Controls (WASD + Arrow Keys)
document.addEventListener("keydown", e => {
  const key = e.key.toLowerCase();

  if ((key === "arrowleft" || key === "a") && dx === 0) {
    dx = -grid; dy = 0;
  }
  else if ((key === "arrowup" || key === "w") && dy === 0) {
    dx = 0; dy = -grid;
  }
  else if ((key === "arrowright" || key === "d") && dx === 0) {
    dx = grid; dy = 0;
  }
  else if ((key === "arrowdown" || key === "s") && dy === 0) {
    dx = 0; dy = grid;
  }
});

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
